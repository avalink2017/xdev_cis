<form [formRoot]="form">
  <div class="flex flex-col gap-4">
    <app-input-ng
      [formField]="form.current"
      type="password"
      label="Contraseña actual"
      [autoFocus]="true"
    />
    <app-input-ng [formField]="form.newPass" type="password" label="Nueva Contraseña" />
    <app-input-ng [formField]="form.confirmPass" type="password" label="Confirmar Contraseña" />
  </div>

  <div class="flex justify-end gap-3 mt-5">
    <p-button
      type="submit"
      label="Cambiar contraseña"
      icon="pi pi-check"
      [disabled]="form().submitting() || form().invalid()"
      [loading]="form().submitting()"
    />
    <p-button
      label="Cancelar"
      icon="pi pi-times"
      severity="secondary"
      [disabled]="form().submitting()"
      (onClick)="formClose()"
    />
  </div>
</form>
