<app-table-view
  [url]="url"
  dataKey="id"
  [clickable]="true"
  [(refresh)]="refresh"
  (rowClick)="onRowClick($event)"
  (onDelete)="onDelete($event)"
  [showToolBar]="false"
>
  <app-table-column field="nombre" header="Nombre" />
  <app-table-column field="numeroCuenta" header="N° Cuenta" />

  <app-table-column field="bancoNombre" header="Banco" filterField="bancoId">
    <ng-template #filter let-col let-value="value" let-filterFn="filter">
      <p-select
        [options]="bankService.bankList()"
        optionLabel="name"
        optionValue="id"
        [ngModel]="value"
        (ngModelChange)="filterFn($event)"
        size="small"
        class="border-0! bg-transparent! shadow-none!"
        placeholder="Seleccionar"
        [showClear]="true"
        appendTo="body"
        fluid
      />
    </ng-template>
  </app-table-column>

  <app-table-column field="tipoCuenta" header="Tipo Cuenta">
    <ng-template #filter let-col let-value="value" let-filterFn="filter">
      <p-select
        [options]="tipoCuentaOptions"
        optionLabel="label"
        optionValue="value"
        [ngModel]="value"
        (ngModelChange)="filterFn($event)"
        size="small"
        class="border-0! bg-transparent! shadow-none!"
        placeholder="Seleccionar"
        [showClear]="true"
        name="ambiente"
        appendTo="body"
        fluid
      />
    </ng-template>
  </app-table-column>

  <app-table-column field="fechaApertura" header="Fecha Apertura" type="date">
    <ng-template #filter let-col let-value="value" let-filterFn="filter">
      <p-datepicker
        dateFormat="dd/mm/yy"
        [ngModel]="value"
        (ngModelChange)="filterFn($event)"
        appendTo="body"
        [showClear]="true"
        placeholder="Seleccionar"
        size="small"
        inputStyleClass="border-0! bg-transparent! shadow-none!"
        [iconDisplay]="'input'"
        [showIcon]="true"
        fluid
      />
    </ng-template>
  </app-table-column>

  <app-table-column
    field="active"
    header="Activo"
    [filterable]="true"
    type="boolean"
    width="10"
    align="center"
  >
    <ng-template #filter let-col let-value="value" let-filterFn="filter">
      <div>
        <p-select
          [options]="actives"
          optionLabel="label"
          optionValue="value"
          [ngModel]="value"
          (ngModelChange)="filterFn($event)"
          appendTo="body"
          [showClear]="true"
          placeholder="Seleccionar"
          size="small"
          class="border-0! bg-transparent! shadow-none!"
        />
      </div>
    </ng-template>
  </app-table-column>
</app-table-view>

<p-drawer
  #drawerRef
  [header]="drawerTitle()"
  [(visible)]="showDrawer"  
  modal
  position="right"
  styleClass="w-full! sm:w-[500px]!"
>
  <ng-container #compo />
</p-drawer>
