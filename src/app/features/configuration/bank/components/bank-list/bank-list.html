<app-table-view
    [url]="url"
    dataKey="id"
    [clickable]="true"
    [(refresh)]="refresh"
    (rowClick)="onRowClick($event)"
    (onDelete)="onDelete($event)"    
    [showToolBar]="false"
  >
    <app-table-column field="code" header="Código" />
    <app-table-column field="name" header="Nombre" />
    <app-table-column field="active" header="Activo" [filterable]="true" type="boolean" align="center">
      <ng-template #filter let-col let-value="value" let-filterFn="filter">
        <div>
          <p-select
            [options]="actives"
            optionLabel="label"
            optionValue="value"
            [ngModel]="value"
            (ngModelChange)="filterFn($event)"
            appendTo="body"
            [showClear]="true"
            placeholder="Seleccionar"
            size="small"
            fluid
            class="border-0! bg-transparent! shadow-none!"
          />
        </div>
      </ng-template>      
    </app-table-column>
  </app-table-view>
