<app-table-view
    [url]="url"
    dataKey="id"
    [clickable]="true"
    [(refresh)]="refresh"
    (rowClick)="onRowClick($event)"
    (onDelete)="onDelete($event)"    
    [showToolBar]="false"
  >
    <app-table-column field="code" header="Código" />
    <app-table-column field="name" header="Nombre" />    
  </app-table-view>
