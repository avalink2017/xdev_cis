<app-page-layout title="Tipo Documento" subtitle="Catálogo de Documentos" iconName="LucideFileCheck">
  <ng-template #headerActions>
    <p-buttongroup>
      <p-button [label]="device.isMobile() ? '':'Crear'" (onClick)="AddNew()">
        <app-icon name="LucideCirclePlus" />
      </p-button>

      <p-button [label]="device.isMobile() ? '':'Refrescar'" (onClick)="refresh.set(true)">
        <app-icon name="LucideRefreshCcw" />
      </p-button>
    </p-buttongroup>
  </ng-template>
  <p-card>
    <ng-container #compo />
  </p-card>
</app-page-layout>
