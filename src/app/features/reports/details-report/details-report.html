<app-page-layout title="Detalle Operaciones" subtitle="Detallado por operaciones" iconName="LucideBook">
  <p-card>
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 md:grid-cols-3">
      <div class="flex flex-col gap-2 col-span-full sm:col-span-1">
        <label for="typereportid">Tipo Operación</label>
        <p-select
          [options]="operaciones"
          optionLabel="label"
          optionValue="id"
          [(ngModel)]="tipoReport"
          inputId="typereportid"
          appendTo="body"
          fluid
        />
      </div>

      <div class="flex flex-col gap-2 col-span-full sm:col-span-1">
        <label for="accountid">Cuenta de Banco</label>
        <p-select
          [options]="cuentas()"
          optionLabel="fullName"
          optionValue="id"
          [(ngModel)]="account"
          inputId="accountid"
          appendTo="body"
          fluid
        />
      </div>

      <div class="flex flex-col gap-2 col-span-full sm:col-span-1">
        <label for="accountid">Período</label>
        <p-datepicker [(ngModel)]="fecha_base" view="month" dateFormat="MM/yy" [readonlyInput]="true" />
      </div>
      

      <div class="flex gap-2 col-span-full">
        <p-button label="Generar" icon="pi pi-check-circle" (onClick)="GenerateReport()" />
        <!-- <p-button label="Imprimir" icon="pi pi-print" (onClick)="PrintReport()" /> -->
      </div>
    </div>
  </p-card>
  <div class="mt-5">
    
  </div>
</app-page-layout>
<app-loading-block [visible]="showLoader()" />
