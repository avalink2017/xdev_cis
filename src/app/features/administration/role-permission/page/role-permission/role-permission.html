<div class="h-full flex flex-col">
  <div class="flex flex-col gap-4 mb-3 shrink-0">

      <div class="flex min-w-0 flex-1 items-center gap-3">
        <div
          class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-primary-100 text-primary-600 dark:bg-primary-800 dark:text-primary-300"
        >
          <app-icon name="LucideShieldUser" [size]="24" />
        </div>

        <div class="min-w-0">
          <h1 class="text-xl font-semibold tracking-tight text-muted-color sm:text-2xl">
            Permisos
          </h1>
          <p class="mt-0.5 truncate text-sm text-muted-color">Permisos por rol</p>
        </div>
      </div>
    </div>
  </div>

  <div class="flex-1 min-h-0 overflow-auto">
    <ng-container #compo />
  </div>
</div>
