<div>
  <div class="mb-3 flex flex-col gap-4">
    <div class="flex gap-3 justify-between px-2">
      <div class="flex min-w-0 flex-1 items-center gap-3">
        @if (iconName(); as icon) {
          <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-primary-100 text-primary-600 dark:bg-primary-800 dark:text-primary-300">
            <app-icon [name]="icon" [size]="iconSize()" />
          </div>
        }
        <div class="min-w-0">
          <h1 class="text-xl font-semibold tracking-tight text-muted-color-emphasis sm:text-2xl">
            {{ title() }}
          </h1>
          @if (subtitle(); as sub) {
            <p class="mt-0.5 truncate text-sm text-muted-color">{{ sub }}</p>
          }
        </div>
      </div>
      @if (headerActions()) {
        <div class="flex shrink-0 items-center gap-2">
          <ng-container [ngTemplateOutlet]="headerActions()!" />
        </div>
      }
    </div>    
  </div>
  <p-card>
    <ng-content />
  </p-card>
  
</div>
