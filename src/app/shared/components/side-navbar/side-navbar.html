<div
  class="flex flex-col h-full lg:border-r border-surface-300 bg-surface-0 dark:bg-surface-900 dark:border-surface-700 lg:w-75!"
>
  @if (device.isLg()) {
    <div class="h-16 flex px-5">
      <span class="font-semibold text-3xl text-primary m-auto">CIS</span>
    </div>
  }

  <div class="grow overflow-y-auto lg:px-3 lg:py-4" [class.sidebar-scroll]="device.isLg()">
    @for (group of groups; track group.label) {
      <div class="mb-2">
        <button
          (click)="toggleGroup(group.label)"
          type="button"
          class="flex items-center justify-between w-full px-3 py-2 text-[11px] uppercase tracking-widest font-semibold text-muted-color hover:text-surface-600 dark:hover:text-surface-300 transition-colors cursor-pointer"
        >
          <span>{{ group.label }}</span>
          <app-icon
            name="LucideChevronRight"
            [size]="14"
            [class.rotate-90]="openGroups().includes(group.label)"
          />
        </button>
        @if (openGroups().includes(group.label)) {
          @for (item of group.items; track item.label) {
            <a
              [routerLink]="item.routerLink"
              routerLinkActive="group-active-item"
              [routerLinkActiveOptions]="{ exact: true }"
              class="group relative flex items-center gap-3 px-4 py-2.5 mx-2 text-sm font-medium text-muted-color-emphasis transition-all duration-150 hover:bg-surface-100 dark:hover:bg-surface-800 hover:text-surface-700 dark:hover:text-surface-50"
            >
              <span
                class="absolute left-0 inset-y-0 w-px bg-surface-300 dark:bg-surface-700 transition-colors duration-150 group-[.group-active-item]:bg-primary-400"
              ></span>
              <app-icon
                [name]="item.icon"
                [size]="18"
                class="shrink-0 group-[.group-active-item]:text-primary-600 dark:group-[.group-active-item]:text-primary-400"
              />
              <span
                class="group-[.group-active-item]:text-primary-600 dark:group-[.group-active-item]:text-primary-400"
                >{{ item.label }}</span
              >
            </a>
          }
        }
      </div>
    }
  </div>
  <div
    class="flex justify-center items-center p-3 border-t border-surface-200 dark:border-surface-700"
  >
    <p-button link label="Cerrar Sesión" (onClick)="logOut()" size="small">
      <app-icon name="LucideLogOut" [size]="15" />
    </p-button>
  </div>
</div>
